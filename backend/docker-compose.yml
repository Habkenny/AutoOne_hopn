services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoone
      POSTGRES_USER: autoone
      POSTGRES_PASSWORD: autoone
    ports:
      - "5432:5432"
    volumes:
      - autoone-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  autoone-postgres:
